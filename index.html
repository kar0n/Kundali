<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vedic Kundali Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/main.css">
  </head>
  <body>
    <div id="app">
      <header class="hero">
        <div class="stars"></div>
        <h1>Vedic Kundali</h1>
        <p>Premium Jyotish Astrology Calculator</p>
      </header>
      
      <main class="container">
        <!-- Input Form Section -->
        <section class="glass-card" id="input-section">
          <h2>Birth Details</h2>
          <form id="birth-form" autocomplete="off">
            <div class="form-group">
              <label for="name">Name (Optional)</label>
              <input type="text" id="name" placeholder="Enter name">
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label>Date of Birth</label>
                <div style="display: flex; gap: 0.5rem;">
                  <select id="dob-day" required>
                    <option value="" disabled selected>Day</option>
                    <!-- Days will be populated via JS -->
                  </select>
                  <select id="dob-month" required>
                    <option value="" disabled selected>Month</option>
                    <option value="01">Jan</option>
                    <option value="02">Feb</option>
                    <option value="03">Mar</option>
                    <option value="04">Apr</option>
                    <option value="05">May</option>
                    <option value="06">Jun</option>
                    <option value="07">Jul</option>
                    <option value="08">Aug</option>
                    <option value="09">Sep</option>
                    <option value="10">Oct</option>
                    <option value="11">Nov</option>
                    <option value="12">Dec</option>
                  </select>
                  <select id="dob-year" required>
                    <option value="" disabled selected>Year</option>
                    <!-- Years will be populated via JS -->
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label for="time">Time of Birth</label>
                <input type="time" id="time" required>
              </div>
            </div>
            
            <div class="form-group">
              <label for="city">City of Birth</label>
              <input type="text" id="city" placeholder="e.g. Mumbai, India" required>
              <small>Coordinates will be calculated automatically.</small>
            </div>
            
            <button type="submit" id="generate-btn" class="primary-btn">Generate Kundali</button>
          </form>
          <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Calculating planetary positions with high precision...</p>
          </div>
        </section>

        <!-- Results Section (Initially Hidden) -->
        <div id="results" class="hidden">
          
          <!-- Charts Grid -->
          <div class="charts-grid">
            <div class="glass-card chart-container">
              <h3>Rashi Chart (D1)</h3>
              <div id="d1-chart"></div>
            </div>
            <div class="glass-card chart-container">
              <h3>Navamsha Chart (D9)</h3>
              <div id="d9-chart"></div>
            </div>
          </div>
          
          <!-- Planetary Details Table -->
          <section class="glass-card" id="planet-table-section">
            <h3>Planetary Positions</h3>
            <div class="table-responsive">
              <table id="planet-table">
                <thead>
                  <tr>
                    <th>Planet</th>
                    <th>Sign</th>
                    <th>Degree</th>
                    <th>Nakshatra</th>
                    <th>Pada</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Populated via JS -->
                </tbody>
              </table>
            </div>
          </section>

          <!-- Dasha Timeline -->
          <section class="glass-card" id="dasha-section">
            <h3>Vimshottari Dasha</h3>
            <p id="dasha-balance" class="dasha-balance"></p>
            <div id="dasha-timeline" class="dasha-timeline">
              <!-- Populated via JS -->
            </div>
          </section>
          
        </div>
      </main>
    </div>
    
    <!-- Inline script for dropdown population — zero dependencies, always runs -->
    <script>
      (function() {
        // Populate Day Dropdown (1–31)
        var daySelect = document.getElementById('dob-day');
        for (var i = 1; i <= 31; i++) {
          var opt = document.createElement('option');
          var val = i < 10 ? '0' + i : '' + i;
          opt.value = val;
          opt.textContent = val;
          daySelect.appendChild(opt);
        }

        // Populate Year Dropdown (current year down to 1900)
        var yearSelect = document.getElementById('dob-year');
        var currentYear = new Date().getFullYear();
        for (var y = currentYear; y >= 1900; y--) {
          var opt = document.createElement('option');
          opt.value = '' + y;
          opt.textContent = '' + y;
          yearSelect.appendChild(opt);
        }
      })();
    </script>

    <!-- App module loaded separately so dropdown UI is never blocked -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
